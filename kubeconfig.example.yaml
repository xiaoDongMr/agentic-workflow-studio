apiVersion: v1
kind: Config
clusters:
  - name: sandbox-cluster
    cluster:
      server: https://<kubernetes-api-server>
      certificate-authority-data: <base64-ca-certificate>
contexts:
  - name: default
    context:
      cluster: sandbox-cluster
      user: sandbox-pool-user
current-context: default
users:
  - name: sandbox-pool-user
    user:
      token: <service-account-token>
